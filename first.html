<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adding CSS to HTML</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        p {
            color: purple;
        }
        h1 {
            color: yellow;
        }
        .same-styling {
            color: #8C3BE3;
        }
        #btn{
            color: darkblue;
        }
        .btn{
            color: red;
        }
        *{
            color: green;
        }
        body{
            background-image: url('https://tse3.https://images.pexels.com/photos/813269/pexels-photo-813269.jpeg.bing.net/th/id/OIP.Uqs7FLmKo1psBQlJ5aLU3QHaEo?rs=1&pid=ImgDetMain&o=7&rm=30');

<body>

    <section id="about">

    <p>Watch it anywhere with Network.</p>

    </section>
