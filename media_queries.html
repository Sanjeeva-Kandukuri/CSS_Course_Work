<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Queries</title>
    <style>
        body{
            background-color: cornflowerblue;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }
        h1{
            font-size: 20px;
            font-weight: bold;
            color: darkblue;
            margin-top: 20px;
        }
        p{
            font-size: 18px;
            font-weight: bold;
            color: cadetblue;
        }
        button{
            padding: 5px;
            width: 20%;
            color: white;
            background-color: burlywood;
        }
      @media(max-width:600px){
            body{
                background-color: darkblue;
                font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;

            }
         
            h1{
                color:cornflowerblue;
                font-size: 30px;
            }
            p{
                color: plum;
                font-size: 20px;
            }
            button{
                border: none;
                width: 20%;
                padding: 8px;
                background-color: crimson;

            }
        }
       @media(min-width:768px) and (max-width:992px){
        body{
            background-color: crimson;
                font-family:cursive;
        }
        h1{
                color:blue;
                font-size: 32px;
            }
            p{
                color: cornflowerblue;
                font-size: 22px;
            }
            button{
                border: none;
                width: 25%;
                padding: 10px;
                background-color: darkcyan;

            }
        }
    </style>
</head>
<body>
    <h1>Unlimited shows , movies and more</h1>
    <p>Start at 149/-.Cancel at any time</p>
    <button>Get Started</button>
</body>
</html>
