<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animations</title>
    <style>
        *{
            margin: 0px;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            margin-top: 30px;
            background-color: darkcyan;
            height: 100vh;
        }
        h1{
            color: ghostwhite;
            font-size: 35px;
            font-weight: bold;
            text-align: center;
            /*animation:name duration timing-function delay iteration-count direction fill-mode(dark,light mode);*/
            animation: color-change 3s ease-in-out 0.5s 5/*infinite*/;
            
        }
        @keyframes color-change {
            0%{
                color: darkblue;
                font-family: Arial, Helvetica, sans-serif;
            }
            100%{
                color: crimson;
            }
            
        }
        .box{
            height: 120px;
            width: 100px;
            margin-left: 10px;
            border-radius: 5px;
            background-color: crimson;
            position: relative;
            animation: position-change 5s ease-in-out 0.5s 5;

        }
        @keyframes position-change {
            0%{
                left: 0;
                top: 0;
            }
            25%{
                top: 0;
                left:90%;

            }
            50%{
                left:90%;
                top:70%;
                background-color: lightgreen;
                border-radius: 50%;

            }
            75%{
                top:70%;
                left:0;
                background-color: aquamarine;
                border-radius: 50%;
            }
            100%{
                left:0;
                top:0;
                border-color: aqua;
                border-radius: 50%;
                transform: scale(1.3);

            }
            
        }

    </style>
</head>
<body>
    <h1>CSS Animation</h1>
    <div class="box">
    </div>
    
</body>
</html>
