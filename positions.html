<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positions</title>
    <style>
        body{
            background-color: cornflowerblue;
            height: 300vh;
        }
        .positions{
            margin:10px;
            padding:10px;
            color: white;
            width: 500px;
        }
        .relative{
            background-color: navy;
            padding: 15px;
            margin: 10px;
            position: relative;
            top:450px;
        }
        .absolute{
            background-color: crimson;
            padding: 15px;
            margin: 10px;
            position: absolute;
            bottom: 30px;
        }
        .fixed{
            background-color: darkseagreen;
            padding: 15px;
            margin: 10px;
            /*position: static; it don't change the position
            right: 40px;*/
            position: fixed;
            right:50px;
        }
        .sticky{
            background-color:yellow ;
            padding:15px ;
            margin: 10px;
            position:sticky;
            top:10px;
        }
    </style>
</head>
<body>
    <div class="positions">
        <div class="relative">Relative Positions opp direction</div>
        <div class="absolute">Out of the box same direction</div>
        <div class="fixed">Fixed at the same direction</div>
    
    </div>
    <div class="sticky">When it's turn fixed to their positions</div>
</body>
</html>
