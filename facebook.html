<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
    <style>
        h3{
            font-family:Arial, Helvetica, sans-serif;
            text-align: left;
            padding-left: 45px;
        }
        body{
            height: 100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, Helvetica, sans-serif;
            
            
        }
        .container{
           border: 1px solid #ddd;
            height: 50%;
            width: 40%;
            border-radius: 5px;
            padding: 10px;
            margin: 10px;
              
        
        }
        input{
            border-radius: 5px;
            height: 30px;
            width: 500px;
           border: 1px solid #ddd; 

        }
        input:hover{
            border-color: black;
        }
        button{
            width: 500px;
            height:30px;
            border-radius: 20px;
        }
        .fp{
            border: 0px;
            background-color: white;
        }
        .login{
            background-color: blue;
            color: white;
        }
        .CA{
            border-color: blue;
            color: blue;
            background-color: white;
        }
       .CA:hover{
        background-color: rgb(224, 221, 221);
       }
       .fp:hover{
          background-color: rgb(224, 221, 221);

       }
       p{
        font-family:'Times New Roman', Times, serif;
       }
        

    </style>
</head>
<body>
    <form class="container">
    <center>
    <h3>Log in to Facebook</h3>
    <input type="text" placeholder="Email address or phone number"/><br><br>
    <input type="password" placeholder="Password"/><br><br>
    <button class="login" type="login">Log in</button><br><br>
    <button class="fp" type="Forget Password">Forgetten Password?</button><br><br><br>
    <button class="CA" type="Create Account" >Create new account</button><br><br>
    <p><b>♾ Meta</b></p>
    </center>
    </form>

    
</body>
</html>
