<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OverFlow</title>
    <style>
        body{
            background-color:blue;
            height:100vh;
        }
        .overflow{
            background-color: blueviolet;
            border:2px solid black;
            height:80px;
            width:300px;
            overflow:auto; /*hidden,auto,scroll,visible,*/
            color: white;
        }
    </style>
</head>
<body>
    <div class="overflow">
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Nam nulla laboriosam alias cumque unde facere veritatis perspiciatis culpa quidem eos, illum enim pariatur error perferendis ratione, iure aspernatur possimus nobis!</p>
    </div>
</body>
</html>
